<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Generator — Kaladeco</title>
  <meta name="description" content="Ketik nama dan pilih font untuk backdrop dekorasi Anda. Preview langsung dan download gratis dari Kaladeco.">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-mark">K</span>
      <span class="nav-logo-text">Kala<span class="accent">deco</span></span>
    </a>
    <div class="nav-links">
      <a href="index.html">Beranda</a>
      <a href="https://kaladeco.vercel.app/" target="_blank" rel="noopener noreferrer">Website Utama</a>
      <a href="https://wa.me/6285283910033?text=Halo%20Kaladeco%2C%20saya%20ingin%20konsultasi%20tentang%20dekorasi" class="nav-cta">Konsultasi 💬</a>
    </div>
    <button class="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Generator -->
  <div class="gen-page">
    <div class="gen-container">
      <div class="gen-header">
        <h1>Font <span style="background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Generator</span></h1>
        <p>Ketik nama, pilih font, dan download preview untuk backdrop dekorasi Anda.</p>
      </div>

      <div class="gen-layout">
        <!-- Left: Controls -->
        <div class="gen-controls">
          <!-- Name Input -->
          <div class="control-group">
            <label class="control-label" for="name-input">Nama / Teks</label>
            <input type="text" id="name-input" class="name-input" placeholder="Ketik nama di sini..." maxlength="60" autocomplete="off">
          </div>

          <!-- Size -->
          <div class="control-group">
            <label class="control-label" for="size-slider">Ukuran Font</label>
            <input type="range" id="size-slider" class="size-slider" min="24" max="150" value="72">
            <div id="size-val" class="size-val">72px</div>
          </div>

          <!-- Category Tabs -->
          <div class="control-group">
            <label class="control-label">Kategori</label>
            <div class="cat-tabs" id="cat-tabs"></div>
          </div>

          <!-- Font Search -->
          <div class="control-group">
            <label class="control-label" for="font-search">Cari Font</label>
            <div class="search-wrap">
              <input type="text" id="font-search" class="font-search" placeholder="Cari nama font..." autocomplete="off">
            </div>
          </div>

          <!-- Font List -->
          <div class="control-group">
            <label class="control-label">Pilih Font</label>
            <div class="font-list" id="font-list"></div>
          </div>
        </div>

        <!-- Right: Preview -->
        <div class="gen-preview">
          <div class="preview-toolbar">
            <div id="font-info" class="font-info">Font: <strong>Great Vibes</strong></div>
          </div>
          <div class="preview-canvas-wrap">
            <div id="preview-text">Nama Anda</div>
          </div>
          <div class="download-bar">
            <button class="btn btn-primary" id="btn-download-png">📸 Download PNG</button>
            <button class="btn btn-secondary" id="btn-download-transparent">🔲 PNG Transparan</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer" style="margin-top:3rem;">
    <p>&copy; 2026 <a href="https://kaladeco.vercel.app/" target="_blank">Kaladeco</a> — Font Generator untuk Dekorasi Backdrop</p>
  </footer>

  <script src="js/fonts.js"></script>
  <script src="js/app.js"></script>
  <script src="js/generator.js"></script>
</body>
</html>
